<!DOCTYPE html>

<html>
<head>

<title>Feedback</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:black;
color:white;
margin:0;
}



.navbar{
padding:15px 30px;
}



.formbox{
background:white;
color:black;
width:450px;
margin:120px auto;
padding:40px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}



.formbox input,
.formbox textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}



.error{
color:red;
font-size:14px;
margin-bottom:10px;
}



.buttons{
margin-top:20px;
display:flex;
justify-content:center;
gap:20px;
}

textarea{
height:120px;
resize:none;
}

</style>

</head>

<body>



<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">SHAMA CYCLE STORES</a>

<div>

<a class="btn btn-light" href="index.html">Home</a> <a class="btn btn-light" href="kids.html">Kids</a> <a class="btn btn-light" href="rangers.html">Rangers</a> <a class="btn btn-light" href="atlas.html">Atlas</a> <a class="btn btn-light" href="feedback.html">Feedback</a>

</div>

</div>

</nav>



<div class="formbox">

<h3 class="text-center">Customer Feedback</h3>

<form onsubmit="return validateForm()">

<label>Name</label> <input type="text" id="name">

<div id="nameError" class="error"></div>

<label>Email</label> <input type="text" id="email">

<div id="emailError" class="error"></div>

<label>Feedback</label>

<textarea id="message"></textarea>

<div id="messageError" class="error"></div>

<div class="buttons">

<button class="btn btn-success">Submit</button>

<button type="button" onclick="history.back()" class="btn btn-secondary">Back</button>

</div>

</form>

</div>

<script>

function validateForm(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let message=document.getElementById("message").value;

let valid=true;



document.getElementById("nameError").innerHTML="";
document.getElementById("emailError").innerHTML="";
document.getElementById("messageError").innerHTML="";



if(name==""){
document.getElementById("nameError").innerHTML="Name is required";
valid=false;
}



if(email=="" || !email.includes("@")){
document.getElementById("emailError").innerHTML="Enter valid email";
valid=false;
}



if(message==""){
document.getElementById("messageError").innerHTML="Please enter feedback";
valid=false;
}

if(valid){
alert("Feedback submitted successfully");
}

return valid;

}

</script>

</body>
</html>
