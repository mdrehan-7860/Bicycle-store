<!DOCTYPE html>

<html>
<head>

<title>Atlas Cycles</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
margin:0;
background:black;
color:white;
}

.section{
padding:80px;
}

.cycles{
display:flex;
justify-content:center;
gap:30px;
}

.card{
width:220px;
background:white;
color:black;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.price{
background:green;
color:white;
padding:6px 15px;
border-radius:20px;
}

/* ORDER FORM */

#orderBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
width:380px;
padding:35px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
text-align:center;
}

#orderBox input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

.btns{
margin-top:15px;
display:flex;
justify-content:center;
gap:15px;
}

.orderbtn{
background:green;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
}

.cancelbtn{
background:red;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
}

</style>

</head>

<body>



<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">SHAMA CYCLE STORES</a>

<div>

<a class="btn btn-light" href="index.html">Home</a> <a class="btn btn-light" href="kids.html">Kids</a> <a class="btn btn-light" href="rangers.html">Rangers</a> <a class="btn btn-light" href="atlas.html">Atlas</a> <a class="btn btn-light" href="feedback.html">Feedback</a>

</div>

</div>

</nav>



<div class="section">

<h2 class="text-center">Atlas Cycles</h2>

<div class="cycles">

<div class="card" onclick="order('Atlas Classic','Road Cycle','₹6500')">
<img src="old.jpeg">
<h3>Atlas Classic</h3>
<div class="price">₹6500</div>
</div>

<div class="card" onclick="order('Atlas Goldline','Road Cycle','₹6200')">
<img src="atlasold.jpeg">
<h3>Atlas Goldline</h3>
<div class="price">₹6200</div>
</div>

</div>

</div>



<div id="orderBox">

<h3 id="cycleName"></h3>

<p id="cyclePrice"></p>

<form onsubmit="placeOrder(event)">

<input type="text" id="name" placeholder="Enter Name" required>

<input type="email" id="email" placeholder="Enter Email" required>

<input type="tel" id="phone" placeholder="Enter Phone Number" pattern="[0-9]{10}" required>

<input type="text" id="address" placeholder="Enter Address" required>

<div class="btns">

<button class="orderbtn">Place Order</button>

<button type="button" class="cancelbtn" onclick="cancelOrder()">Cancel</button>

</div>

</form>

</div>

<script src="menu.js"></script>

</body>
</html>
